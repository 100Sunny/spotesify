services:

# ── Nginx: Proxy inverso
  nginx:
    image: nginx:alpine
    container_name: spotesify-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - frontend
    restart: always

# ── Web: Frontend
  web:
    build: ./web
    container_name: spotesify-web
    ports:
      - "3000:3000"
    networks:
      - frontend
    restart: always

# ── API: Backend Express.js
  api:
    build: ./api
    container_name: spotesify-api
    environment:
      - PORT=5000
      - REDIS_HOST=db
      - REDIS_PORT=6379
      - REDIS_PASSWORD=spotesify123
      - MUSIC_DIR=/data/music
      - REDIS_PASS=spotesify123
    volumes:
      - ./music:/data/music
    networks:
      - frontend
      - backend
    mem_limit: 64m
    restart: always
    depends_on:
      db:
        condition: service_healthy

# ── DB: Redis
  db:
    image: redis:7-alpine
    container_name: spotesify-db
    command: redis-server --requirepass spotesify123
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "spotesify123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: always

# ── Worker: Recolector de métricas
  worker:
    build: ./worker
    container_name: spotesify-worker
    environment:
      - REDIS_HOST=db
      - REDIS_PORT=6379
      - REDIS_PASSWORD=spotesify123
      - COLLECT_INTERVAL=3000
      - REDIS_PASS=spotesify123
    networks:
      - backend
    mem_limit: 64m
    restart: always
    depends_on:
      db:
        condition: service_healthy

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  redis_data:
